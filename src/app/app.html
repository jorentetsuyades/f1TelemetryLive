<div class="app-container">
  <header class="app-header">
    <div class="header-content">
      <img class="header-logo" src="assets/teams/f1.png" alt="F1" />
      <div class="header-text">
        <h1>{{ title() }}</h1>
        <p class="subtitle">Real-time Formula 1 Telemetry &amp; Live Streaming</p>
      </div>
    </div>
  </header>

  <main class="app-main">
    <!-- Top row: standings + stream -->
    <div class="main-grid">
      <section class="section standings-section">
        <app-race-standings (driverSelected)="onDriverSelected($event)"></app-race-standings>
      </section>

      <section class="section stream-section">
        <app-live-stream></app-live-stream>
        <app-track-map [selectedDriverNumber]="selectedDriverNumber"></app-track-map>
      </section>
    </div>

    <!-- Bottom row: telemetry bar -->
    <div class="telem-bar">
      <app-telemetry [selectedDriver]="selectedDriver()"></app-telemetry>
    </div>
  </main>

  <footer class="app-footer">
    <p>&copy; 2025 F1 Live Telemetry. All rights reserved.</p>
  </footer>
</div>

<router-outlet></router-outlet>

<style>

    margin: 0 auto;

    height: 55px;

    object-fit: contain;
    flex-shrink: 0;
    mix-blend-mode: screen;
  }

  .header-content h1 {
    font-size: 1.3rem;
    font-weight: 700;
    margin: 0;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  .subtitle {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.8);
    margin: 0;
  }

  /* ── Main ───────────────────────────── */
  .app-main {

    width: 100%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ── Top grid: standings | stream ───── */
  .main-grid {
    display: grid;
    grid-template-columns: 320px 1fr;

  }

  .section {

  .standings-section {
    min-height: 720px;
    overflow: hidden;
  }

  .stream-section {

  .telem-bar {

  .app-footer {
